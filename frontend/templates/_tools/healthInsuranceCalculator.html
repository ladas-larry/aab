{% js %}
	import Vue from '/js/vue/vue.mjs';
	import HealthInsuranceCalculator from '/js/vue/tools/health-insurance-calculator.mjs';
	document.querySelectorAll('health-insurance-calculator').forEach(el => new Vue({
		el,
		components: {
			HealthInsuranceCalculator,
		},
	}));
{% endjs %}

<health-insurance-calculator
	{% if occupation|default %}initial-occupation="{{ occupation }}"{% endif %}
	{% if static|default %}static{% endif %}></health-insurance-calculator>
