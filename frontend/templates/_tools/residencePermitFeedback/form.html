{% js %}
	import Vue from '/js/vue/vue.mjs';
{% endjs %}
{% js %}
	import FeedbackResidencePermit from '/js/vue/components/feedback-residence-permit.mjs';

	document.querySelectorAll('feedback-residence-permit').forEach(el => new Vue({
		el,
		components: {
			FeedbackResidencePermit,
		},
	}));
{% endjs %}

<feedback-residence-permit
	{% if residence_permit|default %}data-type="{{ residence_permit }}"{% endif %}
	{% if open|default %}open{% endif %}
></feedback-residence-permit>
